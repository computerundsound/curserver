[phpIni]
memory_limit = 512M
max_execution_time = 180
max_input_time = 60
upload_max_filesize = 521M

[phpIniExtend]
xdebug_template_standard_template_file = "xdebug.ini"
profilerDirFromXamppContainerDir = ..\__profiles


[mysqlIni]
max_allowed_packet = 2M
sort_buffer_size = 4M
read_buffer_size = 4M
copyContentFrom = /mysql/my-huge.ini